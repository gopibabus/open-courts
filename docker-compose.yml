services:
    tennis-web:
        image: open-tennis-web
        container_name: open-tennis-web
        build:
            context: .
            dockerfile: docker/Dockerfile
        env_file:
            - docker/.docker.env
        environment:
            # These override whatever is in the bind-mounted .env (Laravel's immutable
            # dotenv loader won't clobber real env vars), so the container talks to the
            # MySQL service while the host can keep using SQLite for quick artisan work.
            CONTAINER_ROLE: app
            DB_CONNECTION: mysql
            DB_HOST: tennis-mysql
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-open_tennis}
            DB_USERNAME: ${DB_USERNAME:-open_tennis}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
        depends_on:
            - tennis-mysql
        volumes:
            - .:/var/www/html
        networks:
            - tennis-network
        ports:
            - "${APP_HOST_PORT:-8080}:80"

    tennis-mysql:
        image: mysql:8.4
        container_name: open-tennis-mysql
        restart: always
        volumes:
            - tennis_sql_data:/var/lib/mysql
        networks:
            - tennis-network
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
            MYSQL_DATABASE: ${DB_DATABASE:-open_tennis}
            MYSQL_USER: ${DB_USERNAME:-open_tennis}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
        ports:
            # Published on 3307 by default to avoid clashing with a host MySQL on 3306.
            - "${DB_HOST_PORT:-3307}:3306"

networks:
    tennis-network:
        driver: bridge

volumes:
    tennis_sql_data:
