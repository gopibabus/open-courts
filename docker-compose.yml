services:
    tennis-web:
        image: open-tennis-web
        container_name: open-tennis-web
        build:
            context: .
            dockerfile: docker/Dockerfile
        env_file:
            - docker/.docker.env
        environment:
            # Override the bind-mounted .env so the container talks to the compose
            # services by name (Laravel's immutable dotenv won't clobber real env vars).
            CONTAINER_ROLE: app
            # Central domain. lvh.me (-> 127.0.0.1) is ideal because the session cookie is
            # shared across club subdomains; but some browsers block lvh.me (DNS-rebinding
            # protection), so we use localhost here. Trade-off: localhost <-> <club>.localhost
            # do NOT share the session cookie, so members log in per club subdomain.
            APP_URL: http://localhost:8080
            CENTRAL_DOMAIN: localhost
            # Host-only cookies ("null"): a Domain=localhost cookie is NOT sent to
            # <club>.localhost in Chrome, which breaks CSRF (419) on subdomain login.
            # Host-only means each subdomain keeps its own session (log in per club).
            SESSION_DOMAIN: "null"
            # Fresh cookie name so any stale Domain=localhost session cookie left over
            # from an earlier config is ignored (avoids duplicate-cookie CSRF 419s).
            SESSION_COOKIE: ot_session
            DB_CONNECTION: pgsql
            DB_HOST: tennis-postgres
            DB_PORT: 5432
            DB_DATABASE: ${DB_DATABASE:-open_tennis}
            DB_USERNAME: ${DB_USERNAME:-open_tennis}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            REDIS_HOST: tennis-redis
            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            MAIL_MAILER: smtp
            MAIL_HOST: tennis-mailpit
            MAIL_PORT: 1025
        depends_on:
            - tennis-postgres
            - tennis-redis
        volumes:
            - .:/var/www/html
        networks:
            - tennis-network
        ports:
            - "${APP_HOST_PORT:-8080}:80"

    tennis-postgres:
        image: postgres:17
        container_name: open-tennis-postgres
        restart: always
        volumes:
            - tennis_pg_data:/var/lib/postgresql/data
        networks:
            - tennis-network
        environment:
            POSTGRES_DB: ${DB_DATABASE:-open_tennis}
            POSTGRES_USER: ${DB_USERNAME:-open_tennis}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        ports:
            - "${DB_HOST_PORT:-5432}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-open_tennis} -d ${DB_DATABASE:-open_tennis}"]
            interval: 5s
            timeout: 5s
            retries: 10

    tennis-redis:
        image: redis:7-alpine
        container_name: open-tennis-redis
        restart: always
        networks:
            - tennis-network
        ports:
            - "${REDIS_HOST_PORT:-6379}:6379"

    tennis-mailpit:
        image: axllent/mailpit:latest
        container_name: open-tennis-mailpit
        restart: always
        networks:
            - tennis-network
        ports:
            - "${MAILPIT_HTTP_PORT:-8025}:8025" # web UI
            - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP

networks:
    tennis-network:
        driver: bridge

volumes:
    tennis_pg_data:
