services:
    tennis-web:
        image: open-tennis-web
        container_name: open-tennis-web
        build:
            context: .
            dockerfile: docker/Dockerfile
        env_file:
            - docker/.docker.env
        environment:
            # Override the bind-mounted .env so the container talks to the compose
            # services by name (Laravel's immutable dotenv won't clobber real env vars).
            CONTAINER_ROLE: app
            # Access the dockerised app at http://lvh.me:8080 and clubs at
            # http://<club>.lvh.me:8080 (lvh.me -> 127.0.0.1, with shared cookies).
            APP_URL: http://lvh.me:8080
            CENTRAL_DOMAIN: lvh.me
            SESSION_DOMAIN: lvh.me
            DB_CONNECTION: pgsql
            DB_HOST: tennis-postgres
            DB_PORT: 5432
            DB_DATABASE: ${DB_DATABASE:-open_tennis}
            DB_USERNAME: ${DB_USERNAME:-open_tennis}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            REDIS_HOST: tennis-redis
            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            MAIL_MAILER: smtp
            MAIL_HOST: tennis-mailpit
            MAIL_PORT: 1025
        depends_on:
            - tennis-postgres
            - tennis-redis
        volumes:
            - .:/var/www/html
        networks:
            - tennis-network
        ports:
            - "${APP_HOST_PORT:-8080}:80"

    tennis-postgres:
        image: postgres:17
        container_name: open-tennis-postgres
        restart: always
        volumes:
            - tennis_pg_data:/var/lib/postgresql/data
        networks:
            - tennis-network
        environment:
            POSTGRES_DB: ${DB_DATABASE:-open_tennis}
            POSTGRES_USER: ${DB_USERNAME:-open_tennis}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        ports:
            - "${DB_HOST_PORT:-5432}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-open_tennis} -d ${DB_DATABASE:-open_tennis}"]
            interval: 5s
            timeout: 5s
            retries: 10

    tennis-redis:
        image: redis:7-alpine
        container_name: open-tennis-redis
        restart: always
        networks:
            - tennis-network
        ports:
            - "${REDIS_HOST_PORT:-6379}:6379"

    tennis-mailpit:
        image: axllent/mailpit:latest
        container_name: open-tennis-mailpit
        restart: always
        networks:
            - tennis-network
        ports:
            - "${MAILPIT_HTTP_PORT:-8025}:8025" # web UI
            - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP

networks:
    tennis-network:
        driver: bridge

volumes:
    tennis_pg_data:
