<VirtualHost *:80>
    ServerName localhost
    # Wildcard alias so every club subdomain (e.g. smashclub.localhost) is served
    # by this vhost. Stancl identifies the tenant from the Host header at runtime,
    # so a single catch-all vhost is all that's needed.
    ServerAlias *.localhost

    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # AllowOverride All lets Laravel's shipped public/.htaccess handle the
        # front-controller rewrites (everything -> index.php).
        AllowOverride All
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    # Content-hashed Vite build assets never change -> cache hard.
    <Directory /var/www/html/public/build>
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 1 year"
        </IfModule>
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    ServerSignature Off
</VirtualHost>
